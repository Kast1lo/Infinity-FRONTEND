<aside class="fone-side-bar">

  <!-- ─── ВЕРХ: аватар ─── -->
  <div class="sb-top">
    <div class="sb-avatar-wrap" routerLink="/profile">
      <p-avatar
        [image]="avatarUrl()"
        size="large"
        shape="circle"
        class="sb-avatar"/>
    </div>
  </div>

  <!-- ─── СЕРЕДИНА: навигация ─── -->
  <nav class="sb-nav">

    <a class="sb-item" routerLink="/profile" routerLinkActive="sb-item--active" [routerLinkActiveOptions]="{ exact: true }" pTooltip="Профиль" tooltipPosition="right">
      <i class="pi pi-home"></i>
    </a>

    <a class="sb-item" routerLink="/infinity-life" routerLinkActive="sb-item--active" pTooltip="Kanban" tooltipPosition="right">
      <i class="pi pi-objects-column"></i>
    </a>

    <a class="sb-item" routerLink="/file-system" routerLinkActive="sb-item--active" pTooltip="Файлы" tooltipPosition="right">
      <i class="pi pi-folder"></i>
    </a>

    <div class="sb-divider"></div>

    <div class="sb-item sb-item--soon" pTooltip="Заметки — скоро" tooltipPosition="right">
      <i class="pi pi-file-edit"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

    <div class="sb-item sb-item--soon" pTooltip="Календарь — скоро" tooltipPosition="right">
      <i class="pi pi-calendar"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

    <div class="sb-item sb-item--soon" pTooltip="Чат — скоро" tooltipPosition="right">
      <i class="pi pi-comments"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

  </nav>

  <!-- ─── НИЗ: тема, настройки, выход ─── -->
  <div class="sb-bottom">

    <!-- Переключатель темы -->
    <button
      class="sb-item sb-item--theme"
      (click)="themeService.toggle()"
      [pTooltip]="isDark() ? 'Светлая тема' : 'Тёмная тема'"
      tooltipPosition="right">
      <i [class]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"></i>
    </button>

    <div class="sb-divider"></div>

    <a class="sb-item" routerLink="/edit" routerLinkActive="sb-item--active" pTooltip="Настройки" tooltipPosition="right">
      <i class="pi pi-cog"></i>
    </a>
    <div class="sb-divider"></div>
    <button class="sb-item sb-item--logout" (click)="authService.logout()" pTooltip="Выйти" tooltipPosition="right">
      <i class="pi pi-sign-out"></i>
    </button>
  </div>

</aside>
