<aside class="fone-side-bar">


  <div class="sb-top">
    <div class="sb-avatar-wrap" routerLink="/profile">
      <p-avatar
        [image]="avatarUrl()"
        size="large"
        shape="circle"
        class="sb-avatar"/>
    </div>
  </div>


  <nav class="sb-nav">

    <a class="sb-item" routerLink="/profile" routerLinkActive="sb-item--active" [routerLinkActiveOptions]="{ exact: true }" [pTooltip]="t().profile" tooltipPosition="right">
      <i class="pi pi-home"></i>
    </a>

    <a class="sb-item" routerLink="/projects" routerLinkActive="sb-item--active" [pTooltip]="t().kanban" tooltipPosition="right">
      <i class="pi pi-objects-column"></i>
    </a>

    <a class="sb-item" routerLink="/file-system" routerLinkActive="sb-item--active" [pTooltip]="t().files" tooltipPosition="right">
      <i class="pi pi-folder"></i>
    </a>

    <div class="sb-divider"></div>

    <div class="sb-item sb-item--soon" [pTooltip]="t().notes" tooltipPosition="right">
      <i class="pi pi-file-edit"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

    <div class="sb-item sb-item--soon" [pTooltip]="t().calendar" tooltipPosition="right">
      <i class="pi pi-calendar"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

    <div class="sb-item sb-item--soon" [pTooltip]="t().chat" tooltipPosition="right">
      <i class="pi pi-comments"></i>
      <span class="sb-soon-badge">soon</span>
    </div>

  </nav>


  <div class="sb-bottom">


    <button
      class="sb-item sb-item--theme"
      (click)="themeService.toggle()"
      [pTooltip]="isDark() ? t().themeLight : t().themeDark"
      tooltipPosition="right">
      <i [class]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"></i>
    </button>

    <button
      class="sb-item sb-item--lang"
      (click)="langService.toggle()"
      [pTooltip]="t().langSwitch"
      tooltipPosition="right">
      <span class="sb-lang-label">{{ langService.lang() === 'ru' ? 'EN' : 'RU' }}</span>
    </button>

    <div class="sb-divider"></div>

    <a class="sb-item" routerLink="/edit" routerLinkActive="sb-item--active" [pTooltip]="t().settings" tooltipPosition="right">
      <i class="pi pi-cog"></i>
    </a>
    <div class="sb-divider"></div>
    <button class="sb-item sb-item--logout" (click)="authService.logout()" [pTooltip]="t().logout" tooltipPosition="right">
      <i class="pi pi-sign-out"></i>
    </button>
  </div>

</aside>
